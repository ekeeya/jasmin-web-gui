<div class="joyce-multi-select-wrap">
    {% if widget.attrs.label %}
        <label for="{{ widget.attrs.id }}" class="block text-sm font-medium text-gray-900 mb-1">
            {{ widget.attrs.label }}
            {% if widget.attrs.required %}<span class="text-red-500">*</span>{% endif %}
        </label>
    {% endif %}
    <select
        name="{{ widget.name }}"
        id="{{ widget.attrs.id }}"
        multiple
        class="joyce-multi-select"
        data-joyce-multiselect
        {% if widget.attrs.required %}required{% endif %}
        {% for attr_name, attr_value in widget.attrs.items %}
            {% if attr_name != 'id' and attr_name != 'label' and attr_name != 'required' and attr_name != 'class' %}
                {{ attr_name }}="{{ attr_value }}"
            {% endif %}
        {% endfor %}
    >
        {% for group_label, group_options, group_index in widget.optgroups %}
            {% if group_label %}
                <optgroup label="{{ group_label }}">
            {% endif %}
            {% for option in group_options %}
                <option value="{{ option.value|stringformat:'s' }}" {% if option.selected %}selected{% endif %}>
                    {{ option.label }}
                </option>
            {% endfor %}
            {% if group_label %}
                </optgroup>
            {% endif %}
        {% endfor %}
    </select>

    {% if form.errors %}
        {% for error in form.errors.name %}
            <p class="mt-1 text-sm text-red-500">{{ error }}</p>
        {% endfor %}
    {% endif %}
</div>
