{% load static %}
<script type="text/javascript" src="{% static 'js/jquery-confirm.min.js' %}"></script>
<script>
    $(document).ready(function() {
    $('[data-action]').on('click', function(e) {
        const actionType = $(this).data("action")
        const url = $(this).data("url")

        const dataAttrKey = 'pk';
        const id = $(this).closest('tr').data(dataAttrKey)
        const item = $(this).closest('tr').data(`row-${id}`)
        const uri = url+`${id}/`;
        const csrfToken = "{{ csrf_token }}"
        $.confirm({
            title: `Are you sure to ${actionType} <b>${item}</b>?`,
            content: '',
            type: 'orange',
            typeAnimated: true,
            boxWidth: '30%',
            useBootstrap: false,
            buttons: {
                tryAgain: {
                    text: 'CONTINUE',
                    btnClass: 'btn-orange',
                    action: function(){
                        initAction(uri, actionType, csrfToken)
                    }
                },
                close: function () {
                }
            }
        });
    });

    function initAction(uri,action, csrfToken){
        
        console.log(uri)
        
        $.ajax({
            url: uri,
            type: 'POST',
            //data: formData,
            headers: {
                'X-CSRFToken': csrfToken
            },
            processData: false,
            contentType: false,
            success: function(data, textStatus, xhr) {
                 location.reload()
            },
            error: function(xhr) {
                console.error('Action failed:', xhr.status, xhr.responseText);
                let msg = 'Action failed';
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (data && data.message) msg = data.message;
                } catch (err) {
                    if (xhr.responseText) msg = xhr.responseText.slice(0, 200);
                }
                $.alert({
                    title: 'Error',
                    content: msg,
                    type: 'red',
                    boxWidth: '30%',
                    useBootstrap: false,
                });
            }
        });
    }
});

</script>
