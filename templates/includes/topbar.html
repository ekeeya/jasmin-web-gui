<nav class="topbar navbar fixed top-0 z-40 w-full md:w-[calc(100%-16rem)] md:ml-64 min-h-14 bg-white/90 backdrop-blur border-b border-neutral-200 px-3 sm:px-5">
    <!-- mobile menu toggle -->
    <div class="flex-none md:hidden">
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-neutral-100 transition-colors" aria-label="Open menu">
            <span class="icon-menu text-2xl"></span>
        </button>
    </div>

    <!-- workspace -->
    <div class="flex-1 min-w-0">
        <div class="flex flex-col leading-tight">
            <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-neutral-400">workspace</span>
            <span class="font-display text-base font-bold tracking-tight text-neutral-900 truncate">{{ workspace.name }}</span>
        </div>
    </div>

    <div class="flex-none flex items-center gap-2 sm:gap-3">
        {# Configure / Operate switch — same workspace + user #}
        <div class="inline-flex items-center rounded-lg border border-neutral-200 bg-neutral-50 p-0.5" role="group" aria-label="Console mode">
            <a href="{% url 'messaging.console_mode' %}?mode=configure"
               class="px-2.5 sm:px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                      {% if joyce_mode_configure %}bg-neutral-950 text-white{% else %}text-neutral-500 hover:text-neutral-900{% endif %}">
                Configure
            </a>
            <a href="{% url 'messaging.console_mode' %}?mode=operate"
               class="px-2.5 sm:px-3 py-1.5 text-xs font-semibold rounded-md transition-colors
                      {% if joyce_mode_operate %}bg-neutral-950 text-white{% else %}text-neutral-500 hover:text-neutral-900{% endif %}">
                Operate
            </a>
        </div>

        <!-- notifications -->
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button"
                 class="btn btn-ghost btn-circle btn-sm h-9 w-9 hover:bg-neutral-100 transition-colors" aria-label="Notifications">
                <span class="icon-bell text-xl text-neutral-600"></span>
            </div>
            <div tabindex="0" class="dropdown-content z-[60] mt-3 w-72 rounded-xl border border-neutral-200 bg-white shadow-xl">
                <div class="px-4 py-3 border-b border-neutral-100">
                    <p class="font-display text-sm font-semibold text-neutral-900">Notifications</p>
                </div>
                <div class="px-4 py-8 text-center">
                    <span class="icon-bell text-2xl text-neutral-300"></span>
                    <p class="mt-2 text-sm text-neutral-500">You're all caught up.</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-neutral-400 mt-1">no new notifications</p>
                </div>
            </div>
        </div>

        <!-- user menu -->
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button"
                 class="btn btn-ghost btn-sm h-9 px-1.5 gap-2 rounded-full hover:bg-neutral-100 transition-colors">
                <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-neutral-950 font-display text-xs font-bold text-white uppercase">
                    {{ user.username|slice:":1" }}
                </span>
                <span class="hidden sm:inline icon-chevron-thin-down text-xs text-neutral-500"></span>
            </div>
            <div tabindex="0" class="dropdown-content z-[60] mt-3 w-56 rounded-xl border border-neutral-200 bg-white shadow-xl overflow-hidden">
                <div class="px-4 py-3 bg-neutral-950 text-white">
                    <p class="font-display text-sm font-semibold truncate">{{ user.username }}</p>
                    <p class="font-mono text-[10px] uppercase tracking-widest text-neutral-400 mt-0.5 truncate">{{ workspace.name }}</p>
                </div>
                <ul class="menu p-2">
                    <li><a class="rounded-lg text-sm hover:bg-neutral-100">Profile</a></li>
                    <li><a class="rounded-lg text-sm hover:bg-neutral-100">Settings</a></li>
                </ul>
                <div class="p-2 border-t border-neutral-100">
                    <form method="post" action="{% url 'users.user_logout' %}">
                        {% csrf_token %}
                        <button type="submit"
                                class="w-full flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-neutral-700 hover:bg-neutral-950 hover:text-white transition-colors">
                            <span class="icon-log-out"></span>
                            Sign out
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>
