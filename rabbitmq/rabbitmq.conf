## Jasmin (txamqp) + RabbitMQ 4.x
## Default consumer_timeout is 30 minutes (1800000). When Jasmin holds an
## unacked MO/DLR (e.g. HTTP connector hanging on localhost), RabbitMQ closes
## the channel and Jasmin's consumers never recover — MO routing dies.
## Use 24h so slow/failed HTTP callbacks don't kill the broker channel.
consumer_timeout = 86400000
